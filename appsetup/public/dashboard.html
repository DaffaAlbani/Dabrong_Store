<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Dabrong Store</title>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { padding-top: 120px; }
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
    }
    @media (max-width: 768px) {
      .dashboard-container { grid-template-columns: 1fr; }
    }
    .sidebar {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r-xl);
      padding: 30px;
      backdrop-filter: var(--glass-blur);
      height: fit-content;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .user-profile {
      text-align: center;
      margin-bottom: 30px;
    }
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--grad-p);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      font-weight: 800;
      color: var(--white);
      box-shadow: 0 0 20px var(--primary-gw);
      font-family: var(--fhead);
    }
    .user-name {
      font-family: var(--fhead);
      font-size: 1.6rem;
      color: var(--white);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .user-role {
      font-size: 0.8rem;
      color: var(--primary-l);
      background: rgba(139, 92, 246, 0.1);
      padding: 4px 12px;
      border-radius: 50px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .menu-list { list-style: none; padding: 0; }
    .menu-item {
      padding: 14px 20px;
      margin-bottom: 8px;
      border-radius: var(--r-md);
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
      transition: all 0.2s;
    }
    .menu-item:hover {
      background: var(--surf2);
      color: var(--white);
    }
    .menu-item.active {
      background: rgba(139, 92, 246, 0.08);
      color: var(--primary-l);
      border-left: 4px solid var(--primary);
    }
    .menu-item.text-red { color: var(--red); }
    .menu-item.text-red:hover { background: rgba(239,68,68,0.1); color: var(--red); }
    
    .content-area {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r-xl);
      padding: 40px;
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .content-title {
      font-family: var(--fhead);
      font-size: 2.2rem;
      color: var(--white);
      margin-bottom: 30px;
      border-bottom: 1px solid var(--bdr);
      padding-bottom: 20px;
      font-weight: 800;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 18px;
      text-align: left;
      border-bottom: 1px solid var(--bdr);
    }
    th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      font-family: var(--fhead);
    }
    td {
      font-size: 0.95rem;
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <i data-lucide="gem" class="logo-gem-icon"></i>
        <div>
          <span class="logo-main">Dabrong<span class="primary-text"> Store</span></span>
          <span class="logo-sub">Top-Up Center</span>
        </div>
      </a>
      <nav class="nav-links" id="nav-links">
        <a href="/" class="nav-a">Home</a>
        <a href="/#marketplace" class="nav-a">Katalog</a>
        <a href="/dashboard" class="nav-a active">Dashboard</a>
        <a href="/status" class="nav-a">Cek Order</a>
      </nav>
      
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="user-profile">
        <div class="avatar" id="user-avatar">D</div>
        <h2 class="user-name" id="user-name">Loading...</h2>
        <span class="user-role" id="user-role">MEMBER</span>
      </div>
      <ul class="menu-list">
        <li class="menu-item active">Riwayat Transaksi</li>
        <li class="menu-item text-red" id="logout-btn">Keluar (Logout)</li>
      </ul>
    </aside>

    <main class="content-area">
      <h2 class="content-title">Riwayat Transaksi Anda</h2>
      
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Produk</th>
              <th>Harga</th>
              <th>Tanggal</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr>
              <td colspan="5" style="text-align:center; padding:30px; color:var(--muted)">Memuat riwayat...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    async function loadDashboard() {
      // 1. Get User Profile
      try {
        const profileRes = await fetch("/api/member/profile");
        const profileData = await profileRes.json();
        
        if (!profileData.success) {
          // Not logged in
          window.location.href = "/login";
          return;
        }

        const user = profileData.user;
        document.getElementById("user-name").innerText = user.username;
        document.getElementById("user-avatar").innerText = user.username.charAt(0).toUpperCase();
        document.getElementById("user-role").innerText = user.role;

      } catch (err) {
        window.location.href = "/login";
        return;
      }

      // 2. Get User Orders
      try {
        const ordersRes = await fetch("/api/member/orders");
        const ordersData = await ordersRes.json();
        const tbody = document.getElementById("orders-tbody");
        tbody.innerHTML = "";

        if (!ordersData.success || !ordersData.orders || ordersData.orders.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px; color:var(--muted)">Belum ada transaksi. <br><br><a href="/" class="btn btn-gold">Beli Sekarang</a></td></tr>`;
          return;
        }

        ordersData.orders.forEach(o => {
          const statusClass = "status-" + (o.status ? o.status.toLowerCase() : "pending");
          tbody.innerHTML += `
            <tr>
              <td style="font-family:monospace; color:var(--gold)">${o.order_no}</td>
              <td>
                <div style="font-weight:600; color:var(--text)">${o.product_name}</div>
                <div style="font-size:0.8rem; color:var(--muted)">ID: ${o.player_id}</div>
              </td>
              <td style="font-weight:600">Rp ${o.total_bayar.toLocaleString('id-ID')}</td>
              <td style="color:var(--muted); font-size:0.9rem">${new Date(o.created_at).toLocaleString()}</td>
              <td><span class="status-badge ${statusClass}">${o.status}</span></td>
            </tr>
          `;
        });
      } catch (e) {
        document.getElementById("orders-tbody").innerHTML = `<tr><td colspan="5">Gagal memuat pesanan.</td></tr>`;
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/member/logout", { method: "POST" });
      window.location.href = "/";
    });

    // Hamburger menu toggle
    const ham = document.getElementById('hamburger');
    const nl  = document.getElementById('nav-links');
    if (ham && nl) {
      ham.addEventListener('click', () => {
        ham.classList.toggle('open');
        nl.classList.toggle('open');
      });
      nl.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        ham.classList.remove('open');
        nl.classList.remove('open');
      }));
    }

    // Theme Switcher
    const toggleBtn = document.getElementById('theme-toggle');
    if (toggleBtn) {
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme !== 'light') {
        document.body.classList.add('dark-mode');
      }
      toggleBtn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    }

    if (window.lucide) {
      lucide.createIcons();
    }

    loadDashboard();
  </script>
</body>
</html>
