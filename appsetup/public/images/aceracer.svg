<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="race-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#ff3d00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Racing Checkered Wing/Car Icon -->
    <g transform="translate(10, 0)">
      <path d="M 15,30 L 45,30 L 35,45 L 65,45 L 55,60 L 85,60 L 70,75 L 20,75 Z" fill="url(#race-grad)"/>
      <path d="M 30,30 L 25,45 M 50,30 L 45,45 M 40,45 L 35,60 M 60,45 L 55,60" stroke="#000" stroke-width="2" opacity="0.3"/>
    </g>

    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#race-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="30" letter-spacing="2" font-style="italic">ACE RACER</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="15" letter-spacing="6" opacity="0.8" font-style="italic">SPEED RACING</text>
  </g>
</svg>
