<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2a3"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Shield / Wings Icon -->
    <g transform="translate(10, 0)">
      <path d="M 40,25 L 55,15 L 70,25 L 65,55 L 55,75 L 45,55 Z" fill="url(#gold)" opacity="0.8"/>
      <path d="M 55,10 L 55,80" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M 30,35 C 30,35 15,40 25,60 C 35,80 55,85 55,85" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
      <path d="M 80,35 C 80,35 95,40 85,60 C 75,80 55,85 55,85" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#gold)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="25" letter-spacing="2">ARENA OF VALOR</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="6" opacity="0.9">ACTION MOBA</text>
  </g>
</svg>
