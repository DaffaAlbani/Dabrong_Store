<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="na-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e1bee7"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Fairy Key Icon -->
    <g transform="translate(10, 0)">
      <circle cx="50" cy="35" r="15" fill="none" stroke="url(#na-grad)" stroke-width="4"/>
      <line x1="50" y1="50" x2="50" y2="85" stroke="url(#na-grad)" stroke-width="4"/>
      <rect x="50" y="65" width="12" height="6" fill="url(#na-grad)"/>
      <rect x="50" y="77" width="12" height="6" fill="url(#na-grad)"/>
    </g>

    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#na-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="2">NEVER AFTER</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="6" opacity="0.8">FAIRYTALE RPG</text>
  </g>
</svg>
