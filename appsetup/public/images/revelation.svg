<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="rev-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b2dfdb"/>
      <stop offset="100%" stop-color="#00bfa5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Feather/Wing Icon -->
    <g transform="translate(10, 0)">
      <path d="M 30,70 C 30,70 45,65 55,40 C 65,15 70,15 70,15 C 70,15 65,30 50,50 C 35,70 30,70 30,70 Z" fill="url(#rev-grad)"/>
      <path d="M 40,70 C 40,70 52,65 60,48 C 68,30 72,30 72,30 C 72,30 68,40 56,56 C 44,72 40,70 40,70 Z" fill="url(#rev-grad)" opacity="0.7"/>
    </g>

    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#rev-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="2">REVELATION</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="6" opacity="0.8">INFINITE JOURNEY</text>
  </g>
</svg>
