<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#ab47bc"/>
      <stop offset="100%" stop-color="#f50057"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Tower/Star Icon -->
    <g transform="translate(10, 0)">
      <path d="M 50,15 L 62,45 L 92,50 L 62,55 L 50,85 L 38,55 L 8,50 L 38,45 Z" fill="url(#cyber)"/>
      <circle cx="50" cy="50" r="10" fill="none" stroke="#fff" stroke-width="2"/>
    </g>
    
    <!-- Text -->
    <text x="190" y="48" text-anchor="middle" fill="#fff" font-family="'Orbitron', sans-serif" font-weight="900" font-size="20" letter-spacing="1">TOWER OF FANTASY</text>
    <text x="190" y="74" text-anchor="middle" fill="url(#cyber)" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="16" letter-spacing="4">NEO-FANTASY RPG</text>
  </g>
</svg>
