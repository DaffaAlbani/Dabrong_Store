<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Dabrong Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: flex-start;
      align-items: center;
      padding-top: 120px;
    }
    .auth-card {
      background: var(--bg);
      border: 1px solid var(--bdr2);
      border-radius: var(--r-lg);
      padding: 55px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      position: relative;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-title {
      font-family: var(--fhead);
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      font-family: var(--fhead);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      color: var(--text);
      padding: 14px 16px;
      border-radius: var(--r-md);
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      border-color: var(--purple);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(155,96,170,0.1);
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .auth-footer a {
      color: var(--gold);
      font-weight: 500;
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    #error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
      display: none;
    }
    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .back-to-home {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--fhead);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      text-decoration: none;
      z-index: 10;
    }
    .back-to-home:hover {
      color: var(--gold);
      transform: translateX(-2px);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <i data-lucide="gem" class="logo-gem-icon"></i>
        <div>
          <span class="logo-main">Dabrong<span class="primary-text"> Store</span></span>
          <span class="logo-sub">Top-Up Center</span>
        </div>
      </a>
      <nav class="nav-links" id="nav-links">
        <a href="/" class="nav-a">Home</a>
        <a href="/#marketplace" class="nav-a">Katalog</a>
        <a href="/status" class="nav-a">Cek Order</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>



  <div class="auth-card">
    <a href="/" class="back-to-home">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      <span>Kembali</span>
    </a>
    <a href="/" class="logo-container">
      <div class="logo">
        <span class="logo-gem">💎</span>
        <div>
          <span class="logo-main">DABRONG STORE</span>
          <span class="logo-sub">Fast & Secure</span>
        </div>
      </div>
    </a>
    
    <div class="auth-header">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Login untuk melihat riwayat top-up Anda</p>
    </div>

    <div id="error-msg">Username atau password salah!</div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input type="text" id="identity" class="form-input" placeholder="Masukkan username atau email" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required style="padding-right: 40px;" />
          <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%; justify-content:center;">LOGIN SEKARANG</button>
    </form>

    <div class="auth-footer">
      Belum punya akun? <a href="/register">Daftar di sini</a>
    </div>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const identity = document.getElementById("identity").value;
      const password = document.getElementById("password").value;
      const btn = e.target.querySelector("button");
      const err = document.getElementById("error-msg");

      btn.disabled = true;
      btn.innerText = "LOADING...";
      err.style.display = "none";

      try {
        const res = await fetch("/api/member/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identity, password })
        });
        const data = await res.json();
        
        if (data.success) {
          if (data.admin_path) {
            window.location.href = data.admin_path;
          } else {
            window.location.href = "/dashboard";
          }
        } else {
          err.innerText = data.message || "Gagal login. Silakan periksa kembali data Anda.";
          err.style.display = "block";
          btn.disabled = false;
          btn.innerText = "LOGIN SEKARANG";
        }
      } catch (err) {
        console.error(err);
        err.innerText = "Terjadi kesalahan koneksi server.";
        err.style.display = "block";
        btn.disabled = false;
        btn.innerText = "LOGIN SEKARANG";
      }
    });

    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.innerHTML = type === 'password' 
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>' 
          : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';
      });
    }

    // Mobile hamburger menu toggle
    const ham = document.getElementById('hamburger');
    const nl  = document.getElementById('nav-links');
    if (ham && nl) {
      ham.addEventListener('click', () => {
        ham.classList.toggle('open');
        nl.classList.toggle('open');
      });
    }

    // Theme Switcher
    const toggleBtn = document.getElementById('theme-toggle');
    if (toggleBtn) {
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme !== 'light') {
        document.body.classList.add('dark-mode');
      }
      toggleBtn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    }

    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</body>
</html>
