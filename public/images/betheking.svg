<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="crown-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="50%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Crown Icon -->
    <g transform="translate(10, 0)">
      <path d="M 20,70 L 25,35 L 40,50 L 50,30 L 60,50 L 75,35 L 80,70 Z" fill="url(#crown-grad)"/>
      <circle cx="25" cy="30" r="3" fill="#fff"/>
      <circle cx="40" cy="45" r="3" fill="#fff"/>
      <circle cx="50" cy="25" r="4" fill="#fff"/>
      <circle cx="60" cy="45" r="3" fill="#fff"/>
      <circle cx="75" cy="30" r="3" fill="#fff"/>
      <rect x="25" y="62" width="50" height="5" fill="#fff" opacity="0.5"/>
    </g>

    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#crown-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="2">BE THE KING</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="6" opacity="0.8">STRATEGY RPG</text>
  </g>
</svg>
