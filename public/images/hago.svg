<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="hago-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee55"/>
      <stop offset="100%" stop-color="#26a69a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Cute controller icon -->
    <g transform="translate(15, 0)">
      <rect x="25" y="30" width="50" height="36" rx="18" fill="url(#hago-grad)"/>
      <circle cx="38" cy="48" r="4" fill="#111"/>
      <circle cx="62" cy="48" r="4" fill="#111"/>
      <path d="M 44,56 Q 50,62 56,56" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="31" cy="36" r="3" fill="#fff" opacity="0.7"/>
      <circle cx="69" cy="36" r="3" fill="#fff" opacity="0.7"/>
    </g>

    <!-- Text -->
    <text x="180" y="64" text-anchor="middle" fill="url(#hago-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="44" letter-spacing="4">HAGO</text>
  </g>
</svg>
