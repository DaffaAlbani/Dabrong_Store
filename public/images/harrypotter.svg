<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="hp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Magic Wand and Spark -->
    <g transform="translate(10, 0)">
      <path d="M 25,75 L 75,25" stroke="url(#hp-grad)" stroke-width="4" stroke-linecap="round"/>
      <path d="M 70,20 L 75,25 L 80,20 L 75,30 Z" fill="#fff"/>
      <!-- Lightning bolt -->
      <path d="M 45,20 L 35,45 L 50,45 L 40,75 L 65,40 L 50,40 Z" fill="url(#hp-grad)"/>
    </g>

    <!-- Text -->
    <text x="185" y="48" text-anchor="middle" fill="url(#hp-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="24" letter-spacing="2">HARRY POTTER</text>
    <text x="185" y="74" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="4" opacity="0.9">MAGIC AWAKENED</text>
  </g>
</svg>
