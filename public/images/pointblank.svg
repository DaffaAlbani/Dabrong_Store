<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Crosshair Icon -->
    <g transform="translate(10, 0)">
      <circle cx="50" cy="50" r="23" fill="none" stroke="url(#silver)" stroke-width="4"/>
      <circle cx="50" cy="50" r="7" fill="none" stroke="#ff3d00" stroke-width="3"/>
      <line x1="50" y1="18" x2="50" y2="34" stroke="url(#silver)" stroke-width="3"/>
      <line x1="50" y1="66" x2="50" y2="82" stroke="url(#silver)" stroke-width="3"/>
      <line x1="18" y1="50" x2="34" y2="50" stroke="url(#silver)" stroke-width="3"/>
      <line x1="66" y1="50" x2="82" y2="50" stroke="url(#silver)" stroke-width="3"/>
    </g>
    
    <!-- Text -->
    <text x="185" y="54" text-anchor="middle" fill="url(#silver)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="1">POINT BLANK</text>
    <text x="185" y="78" text-anchor="middle" fill="#ff3d00" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="8">FPS ONLINE</text>
  </g>
</svg>
