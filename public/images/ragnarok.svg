<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="ro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a9e"/>
      <stop offset="100%" stop-color="#fecfef"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Poring Slime Icon -->
    <g transform="translate(10, 0)">
      <ellipse cx="50" cy="55" rx="25" ry="20" fill="url(#ro-grad)"/>
      <ellipse cx="42" cy="50" rx="2.5" ry="4" fill="#000"/>
      <ellipse cx="58" cy="50" rx="2.5" ry="4" fill="#000"/>
      <path d="M 46,58 Q 50,62 54,58" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="38" cy="54" rx="3" ry="1.5" fill="#ff4081" opacity="0.6"/>
      <ellipse cx="62" cy="54" rx="3" ry="1.5" fill="#ff4081" opacity="0.6"/>
    </g>

    <!-- Text -->
    <text x="185" y="52" text-anchor="middle" fill="url(#ro-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="2">RAGNAROK</text>
    <text x="185" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="15" letter-spacing="6" opacity="0.9">ONLINE</text>
  </g>
</svg>
