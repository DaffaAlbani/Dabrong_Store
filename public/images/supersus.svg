<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="sus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="50%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#b39ddb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Visor Icon -->
    <g transform="translate(10, 0)">
      <rect x="25" y="25" width="50" height="50" rx="15" fill="none" stroke="url(#sus-grad)" stroke-width="4"/>
      <rect x="33" y="35" width="34" height="20" rx="10" fill="#80deea"/>
      <path d="M 37,40 Q 45,45 60,40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Text -->
    <text x="180" y="52" text-anchor="middle" fill="url(#sus-grad)" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" letter-spacing="2">SUPER SUS</text>
    <text x="180" y="78" text-anchor="middle" fill="#fff" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="14" letter-spacing="6" opacity="0.8">WHO IS THE IMPOSTOR</text>
  </g>
</svg>
